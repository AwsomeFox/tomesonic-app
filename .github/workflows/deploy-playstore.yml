name: Deploy to Play Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Release track (internal, closed, alpha, beta, production)'
        required: true
        default: 'alpha'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --prefix native

      - name: Decode keystore
        run: |
          echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > native/android/app/upload-keystore.jks

      - name: Build App Bundle
        # Run from native/android (not the repo root): the Sentry gradle
        # snippet resolves its script path via `node --print require.resolve`,
        # which needs native/node_modules reachable from the working directory.
        # SENTRY_DISABLE_AUTO_UPLOAD skips source-map upload until Sentry
        # org/project/auth-token secrets are configured.
        working-directory: native/android
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
        run: |
          ./gradlew bundleRelease --no-daemon \
            -PMYAPP_UPLOAD_STORE_FILE=upload-keystore.jks \
            -PMYAPP_UPLOAD_STORE_PASSWORD="${{ secrets.UPLOAD_STORE_PASSWORD }}" \
            -PMYAPP_UPLOAD_KEY_ALIAS="${{ secrets.UPLOAD_KEY_ALIAS }}" \
            -PMYAPP_UPLOAD_KEY_PASSWORD="${{ secrets.UPLOAD_KEY_PASSWORD }}"

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.tomesonic.app
          releaseFiles: native/android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'alpha' }}
          status: completed
          inAppUpdatePriority: 2

      - name: Clean up keystore
        if: always()
        run: rm -f native/android/app/upload-keystore.jks
