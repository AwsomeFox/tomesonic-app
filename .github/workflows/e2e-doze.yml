name: E2E Doze (Maestro, nightly)

# NON-BLOCKING, NIGHTLY-ONLY. This workflow verifies that playback and the
# native sleep-timer enforcer survive / fire under Android Doze (deep idle),
# which requires putting a real emulator into `dumpsys deviceidle force-idle`
# and sleeping for minutes — far too slow and too flaky to gate a PR on.
#
# It therefore triggers on `schedule:` (nightly) and `workflow_dispatch:` ONLY.
# There is deliberately NO `pull_request:` and NO `push:` trigger, so this can
# NEVER run on a PR and can NEVER become a required/PR-blocking check. Do NOT
# add it to branch protection. The doze flow step is additionally marked
# `continue-on-error: true` so even the nightly run reports a soft result.
#
# FIRST VALIDATION happens on the first nightly run (or a manual
# workflow_dispatch), NOT in the PR that introduces this file — there is no
# emulator/KVM in the PR author's environment to dry-run it against.
on:
  schedule:
    # 07:00 UTC nightly.
    - cron: '0 7 * * *'
  workflow_dispatch:

# A newer dispatch/schedule supersedes an in-flight run.
concurrency:
  group: e2e-doze-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Distinct check-run name; this is NOT wired into branch protection.
    name: e2e-doze-build
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      # Reclaim ~20 GB of unused preinstalled toolchains so the NDK compile +
      # APK packaging have headroom (keep the Android SDK/NDK the build needs).
      - name: free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
            /opt/hostedtoolcache/CodeQL /usr/share/swift \
            "$AGENT_TOOLSDIRECTORY"/Ruby "$AGENT_TOOLSDIRECTORY"/PyPy || true
          df -h /

      - name: checkout sources
        uses: actions/checkout@v4

      - name: use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: native/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      # SAME cache key as e2e-smoke.yml's build job, so the nightly run reuses
      # the APK the smoke gate already built for the same app sources instead of
      # recompiling. Any change to app sources produces a new key and rebuilds.
      - name: cache built APK
        id: apk-cache
        uses: actions/cache@v4
        with:
          path: native/android/app/build/outputs/apk/release/app-release.apk
          key: e2e-apk-x86_64-${{ hashFiles('native/**', '!native/.maestro/**') }}

      # Compiler cache for the NDK/C++ compile — source-change rebuilds hit
      # warm object caches (~8-10 min -> ~3-4).
      - name: ccache
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: e2e-ndk-x86_64
          max-size: 1G

      - name: install dependencies
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: npm ci --prefix native

      - name: build release APK (x86_64 only)
        if: steps.apk-cache.outputs.cache-hit != 'true'
        # RELEASE, not debug: debug APKs load JS from a Metro dev server that
        # doesn't exist on the CI emulator. x86_64 ONLY: the New Architecture
        # CMake-compiles every native lib per ABI and the emulator only runs
        # x86_64, so one ABI cuts the native compile ~4x.
        working-directory: native/android
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: ./gradlew assembleRelease --no-daemon -x lint -x test -PreactNativeArchitectures=x86_64

      - name: upload APK
        uses: actions/upload-artifact@v4
        with:
          name: e2e-doze-release-apk
          path: native/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  e2e-doze:
    # Distinct check-run name; this is NOT wired into branch protection.
    name: e2e-doze
    needs: build
    runs-on: ubuntu-latest
    # Longer than the smoke job: each scenario sleeps minutes inside deep Doze.
    timeout-minutes: 60
    steps:
      # This job runs the docker ABS image + emulator system image; free the
      # same headroom so packaging/booting has room (no gradle/NDK here).
      - name: free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
            /usr/share/swift \
            "$AGENT_TOOLSDIRECTORY"/Ruby "$AGENT_TOOLSDIRECTORY"/PyPy || true
          df -h /

      - name: checkout sources
        uses: actions/checkout@v4

      # Land the built APK where ci-doze.sh installs it from.
      - name: download APK
        uses: actions/download-artifact@v4
        with:
          name: e2e-doze-release-apk
          path: native/android/app/build/outputs/apk/release/

      - name: seed media fixture (generated audiobook + ebook)
        run: |
          # ubuntu-latest no longer preinstalls ffmpeg.
          sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
          # Author/Series/Book folder layout so ABS derives a series too.
          # Two 7-minute sine-tone tracks (2 chapters — the sleep-timer flow
          # needs a chaptered book). The 14-minute total must comfortably exceed
          # BOTH doze windows: playback must still be running past the 3-min
          # playback-survival sleep AND past the 5-min sleep-timer preset that
          # fires inside the 6-min sleep-timer window — a shorter book would end
          # first and neither assertion could be proven.
          mkdir -p "$PWD/e2e-media/Test Author/Test Series/1 - The Test Book"
          cd "$PWD/e2e-media/Test Author/Test Series/1 - The Test Book"
          ffmpeg -loglevel error -f lavfi -i "sine=frequency=440:duration=420" \
            -metadata title="Chapter 1" -metadata artist="Test Author" \
            -metadata album="The Test Book" track1.mp3
          ffmpeg -loglevel error -f lavfi -i "sine=frequency=550:duration=420" \
            -metadata title="Chapter 2" -metadata artist="Test Author" \
            -metadata album="The Test Book" track2.mp3
          # Ebook-only item so the seeded library matches the smoke fixture
          # (keeps the "pin the audiobook" selectors meaningful).
          mkdir -p "$GITHUB_WORKSPACE/e2e-media/Test Author/The Test Ebook"
          python3 "$GITHUB_WORKSPACE/native/.maestro/make-epub.py" \
            "$GITHUB_WORKSPACE/e2e-media/Test Author/The Test Ebook/the-test-ebook.epub"

      - name: start + provision Audiobookshelf
        run: |
          docker run -d --name abs -p 13378:80 \
            -v "$PWD/e2e-media":/media:ro \
            ghcr.io/advplyr/audiobookshelf:latest
          # Wait for the server, then create the root user and a library.
          for i in $(seq 1 60); do
            curl -sf http://localhost:13378/status > /dev/null && break; sleep 2
          done
          curl -sf http://localhost:13378/status
          curl -sf -X POST http://localhost:13378/init \
            -H 'Content-Type: application/json' \
            -d '{"newRoot":{"username":"root","password":"testpass"}}'
          TOKEN=$(curl -sf -X POST http://localhost:13378/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"root","password":"testpass"}' | jq -r '.user.token')
          LIB=$(curl -sf -X POST http://localhost:13378/api/libraries \
            -H "Authorization: Bearer $TOKEN" -H 'Content-Type: application/json' \
            -d '{"name":"Test Library","folders":[{"fullPath":"/media"}],"mediaType":"book","provider":"custom"}' \
            | jq -r '.id')
          curl -sf -X POST "http://localhost:13378/api/libraries/$LIB/scan" \
            -H "Authorization: Bearer $TOKEN" || true
          # Wait until the scan surfaces the seeded book.
          for i in $(seq 1 60); do
            COUNT=$(curl -sf "http://localhost:13378/api/libraries/$LIB/items?limit=1" \
              -H "Authorization: Bearer $TOKEN" | jq -r '.total // 0')
            [ "$COUNT" -ge 1 ] && break; sleep 2
          done
          echo "library items: $COUNT"
          [ "$COUNT" -ge 1 ]

      - name: install Maestro
        run: curl -Ls https://get.maestro.mobile.dev | bash

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: run Doze E2E flows on emulator
        # NON-BLOCKING: a failure here must never fail the workflow (and this
        # workflow can never run on a PR anyway). The script itself also retries
        # each Maestro flow. First real validation is this nightly/dispatch run.
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          # NOTE: the action runs EACH line in its own shell — keep this a
          # single command (the script owns PATH/cd, the adb doze sandwich, and
          # the flow order).
          script: bash native/.maestro/ci-doze.sh

      - name: capture device logcat
        if: always()
        run: |
          adb -s emulator-5554 logcat -d > $HOME/full-logcat.txt || true
          grep -iE "CONSOLE|ReactNativeJS|AndroidRuntime|FATAL|deviceidle|SleepTimer|doze" \
            $HOME/full-logcat.txt > $HOME/logcat-console.txt || true
          wc -l $HOME/full-logcat.txt $HOME/logcat-console.txt || true

      # Always upload Maestro output — the whole value of a non-blocking nightly
      # job is the artifacts it leaves for a human to inspect the next morning.
      - name: upload maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-doze-debug
          path: |
            ~/.maestro/tests/
            ~/full-logcat.txt
            ~/logcat-console.txt
          if-no-files-found: ignore
