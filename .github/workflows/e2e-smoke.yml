name: E2E (Maestro)

# Opt-in (manual trigger): full end-to-end run on an Android emulator against
# a THROWAWAY Audiobookshelf server spun up inside the job — no real server or
# secrets involved. The job:
#   1. builds the debug APK
#   2. starts the official ABS docker image, creates a root user via /init,
#      and seeds a generated audiobook (ffmpeg sine tones) into a library
#   3. boots an emulator, installs the APK, logs in through the real Connect
#      screen (10-login against http://10.0.2.2:13378), then runs every flow
# Catches what jest can't: native boot crashes, real Media3 playback, real
# navigation, and the actual ABS login/session handshake. ~30 min of runner.
# workflow_dispatch works once this file lands on the default branch (post
# merge). Until then the pull_request trigger — scoped to the E2E files
# themselves — runs it from the PR branch, so it only costs runner time when
# the flows or this workflow actually change.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'native/.maestro/**'
      - '.github/workflows/e2e-smoke.yml'

# A newer E2E push cancels the in-flight run (each costs ~30 runner-minutes).
concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: checkout sources
        uses: actions/checkout@v3

      - name: use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: native/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v2
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: install dependencies
        run: npm ci --prefix native

      - name: build debug APK
        working-directory: native/android
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
        run: ./gradlew assembleDebug --no-daemon

      - name: seed media fixture (generated audiobook)
        run: |
          # ubuntu-latest no longer preinstalls ffmpeg.
          sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
          # Author/Series/Book folder layout so ABS derives a series too
          # (the 40-library-series flow needs one). Two 90s sine-tone tracks.
          mkdir -p "$PWD/e2e-media/Test Author/Test Series/1 - The Test Book"
          cd "$PWD/e2e-media/Test Author/Test Series/1 - The Test Book"
          ffmpeg -loglevel error -f lavfi -i "sine=frequency=440:duration=90" \
            -metadata title="Chapter 1" -metadata artist="Test Author" \
            -metadata album="The Test Book" track1.mp3
          ffmpeg -loglevel error -f lavfi -i "sine=frequency=550:duration=90" \
            -metadata title="Chapter 2" -metadata artist="Test Author" \
            -metadata album="The Test Book" track2.mp3

      - name: start + provision Audiobookshelf
        run: |
          docker run -d --name abs -p 13378:80 \
            -v "$PWD/e2e-media":/media:ro \
            ghcr.io/advplyr/audiobookshelf:latest
          # Wait for the server, then create the root user and a library.
          for i in $(seq 1 60); do
            curl -sf http://localhost:13378/status > /dev/null && break; sleep 2
          done
          curl -sf http://localhost:13378/status
          curl -sf -X POST http://localhost:13378/init \
            -H 'Content-Type: application/json' \
            -d '{"newRoot":{"username":"root","password":"testpass"}}'
          TOKEN=$(curl -sf -X POST http://localhost:13378/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"root","password":"testpass"}' | jq -r '.user.token')
          LIB=$(curl -sf -X POST http://localhost:13378/api/libraries \
            -H "Authorization: Bearer $TOKEN" -H 'Content-Type: application/json' \
            -d '{"name":"Test Library","folders":[{"fullPath":"/media"}],"mediaType":"book","provider":"custom"}' \
            | jq -r '.id')
          curl -sf -X POST "http://localhost:13378/api/libraries/$LIB/scan" \
            -H "Authorization: Bearer $TOKEN" || true
          # Wait until the scan surfaces the seeded book.
          for i in $(seq 1 60); do
            COUNT=$(curl -sf "http://localhost:13378/api/libraries/$LIB/items?limit=1" \
              -H "Authorization: Bearer $TOKEN" | jq -r '.total // 0')
            [ "$COUNT" -ge 1 ] && break; sleep 2
          done
          echo "library items: $COUNT"
          [ "$COUNT" -ge 1 ]

      - name: install Maestro
        run: curl -Ls https://get.maestro.mobile.dev | bash

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: run E2E flows on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          # NOTE: the action runs EACH line in its own shell — keep this a
          # single command (the script owns PATH/cd and the flow order).
          script: bash native/.maestro/ci-flows.sh

      - name: upload maestro artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug
          path: ~/.maestro/tests/
          if-no-files-found: ignore
