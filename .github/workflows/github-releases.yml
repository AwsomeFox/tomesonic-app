name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: native/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci --prefix native

      - name: Build release APK
        # Run from native/android — the Sentry gradle snippet resolves its
        # script path relative to the working directory (see build-apk.yml).
        working-directory: native/android
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
        run: ./gradlew assembleRelease --no-daemon -x lint -x test -PreactNativeArchitectures=arm64-v8a,x86_64

      - name: Rename APK
        working-directory: native/android/app/build/outputs/apk/release/
        run: |
          version="${GITHUB_REF#refs/tags/}"
          mv app-release.apk "tomesonic-${version}.apk"

      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          cat > release_notes.md << EOF
          ## 🎉 TomeSonic ${VERSION}

          ### 📱 Download
          - **Android**: Download the APK below and install on your device
          - **Play Store**: Available on [Google Play Store](https://play.google.com/store/apps/details?id=com.tomesonic.app)

          ### 🔧 Technical Details
          - Built from commit: ${GITHUB_SHA:0:7}
          - Build date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          ### 📖 Full Documentation
          See the [README](https://github.com/AwsomeFox/tomesonic-app#readme) for setup instructions and features.
          EOF
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "TomeSonic ${{ steps.release_notes.outputs.VERSION }}"
          body_path: release_notes.md
          files: |
            native/android/app/build/outputs/apk/release/tomesonic-*.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
