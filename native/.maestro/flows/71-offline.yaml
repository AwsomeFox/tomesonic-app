# OFFLINE playback of the downloaded book. Requires networking to be OFF
# (ci-flows.sh disables wifi+data via adb before running this and re-enables
# after) — tagged manual so plain `npm run e2e` skips it.
appId: com.tomesonic.app
tags:
  - manual
---
- launchApp:
    stopApp: true
# The bookshelf switches to the offline view.
- extendedWaitUntil:
    visible: "Available Offline"
    timeout: 30000
# Play the downloaded book — startPlayback falls back to the on-device local
# session (no server reachable) and the player must still open and play.
- tapOn:
    text: "Play .* offline"
    index: 0
- extendedWaitUntil:
    visible: "Collapse player"
    timeout: 30000
- assertVisible: "Pause"
- tapOn: "Pause"
- tapOn: "Collapse player"
