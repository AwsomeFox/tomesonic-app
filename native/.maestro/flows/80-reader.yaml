# Ebook reader: open an ebook-only item from the Library tab, wait for
# foliate to render (page indicator appears), exercise the TOC and reading
# settings sheets, close the reader, and verify the reading-progress pipeline
# end-to-end — after reading, the Home shelf must grow a "Continue Reading"
# row for the book (reader cfi -> PATCH -> /me progress -> shelf build).
# Requires network (foliate + the epub stream). CI passes EBOOK_ROW pinned to
# the seeded ebook; locally it defaults to the first ebook-only row.
appId: com.tomesonic.app
env:
  EBOOK_ROW: "Read .*"
---
- launchApp
- extendedWaitUntil:
    visible: "Home"
    timeout: 20000
- tapOn: "Library"
- extendedWaitUntil:
    visible: ${EBOOK_ROW}
    timeout: 20000
- tapOn:
    text: ${EBOOK_ROW}
    index: 0
# Foliate parses the epub inside the WebView; the RN chrome's page indicator
# only renders once the first location event arrives.
- extendedWaitUntil:
    visible: "Page .* of .*"
    timeout: 60000
# Table of contents opens and closes.
- tapOn: "Table of contents"
- extendedWaitUntil:
    visible: "Close table of contents"
    timeout: 5000
- tapOn: "Close table of contents"
# Reading settings opens and closes.
- tapOn: "Reading settings"
- extendedWaitUntil:
    visible: "Increase text size"
    timeout: 5000
- tapOn: "Close reading settings"
# Close the reader (unmount flushes the cfi to the server).
- tapOn: "Close reader"
# Back on Home, the reading progress must surface as a Continue Reading shelf.
- tapOn: "Home"
- extendedWaitUntil:
    visible: "Continue Reading"
    timeout: 30000
